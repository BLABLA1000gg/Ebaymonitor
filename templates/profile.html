<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Search profile</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head><body>
<header><div><p class="eyebrow">CONFIGURATION</p><h1>{{ 'Edit' if profile else 'New' }} search profile</h1></div><a href="{{ url_for('index') }}">Back to dashboard</a></header>
<main><form class="form" method="post">
<label>Name<input required name="name" value="{{ profile.name if profile else '' }}" placeholder="MacBook Pro M1"></label>
<label class="wide">Active eBay search URL<input required type="url" name="ebay_url" value="{{ profile.ebay_url if profile else '' }}" placeholder="https://www.ebay.de/sch/i.html?_nkw=..."></label>
<label>Required keywords<input name="include_keywords" value="{{ profile.include_keywords if profile else '' }}" placeholder="macbook, pro, m1"></label>
<label>Excluded keywords<input name="exclude_keywords" value="{{ profile.exclude_keywords if profile else '' }}" placeholder="defekt, ersatzteile, hülle"></label>
<label>Minimum price<input type="number" step="0.01" name="min_price" value="{{ profile.min_price if profile and profile.min_price is not none else '' }}"></label>
<label>Maximum price<input type="number" step="0.01" name="max_price" value="{{ profile.max_price if profile and profile.max_price is not none else '' }}"></label>
<label>Currency<select name="currency"><option value="">Any</option>{% for value in ['EUR','USD','GBP'] %}<option {% if profile and profile.currency == value %}selected{% endif %}>{{ value }}</option>{% endfor %}</select></label>
<label>Sold-history window (days)<input type="number" min="1" max="365" name="sold_window_days" value="{{ profile.sold_window_days if profile else 90 }}"></label>
<label class="check"><input type="checkbox" name="enabled" {% if not profile or profile.enabled %}checked{% endif %}> Enable monitoring</label>
<div class="actions wide"><button class="button" type="submit">Save profile</button></div>
</form>{% if profile %}<form class="danger-zone" action="{{ url_for('delete_profile', profile_id=profile.id) }}" method="post"><button class="danger" type="submit">Delete profile</button></form>{% endif %}</main></body></html>
